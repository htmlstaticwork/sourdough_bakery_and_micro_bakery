<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Start Your Ritual | Handmade Soap & Skincare Registration</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: { primary: '#3A4D39', secondary: '#FAF5EF', accent: '#A47E3B', dark: { bg: '#101010', card: 'rgba(30,30,30,0.7)', text: '#F5F5F5' } },
                    fontFamily: { premium: ['Playfair Display', 'serif'], body: ['Outfit', 'sans-serif'] }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="assets/css/style.css">
    <style>
        .auth-bg {
            background: linear-gradient(135deg, var(--secondary) 0%, var(--primary) 100%);
            position: relative;
            overflow: hidden;
        }

        .auth-bg::after {
            content: "🌿";
            position: absolute;
            top: 10%;
            right: 10%;
            font-size: 20rem;
            opacity: 0.05;
            transform: rotate(15deg);
        }

        .auth-bg::before {
            content: "🧼";
            position: absolute;
            bottom: 10%;
            left: 10%;
            font-size: 15rem;
            opacity: 0.1;
            transform: rotate(-15deg);
        }

        .slide-up-form {
            opacity: 0;
            transform: translateY(100px);
            animation: slideUp 1s cubic-bezier(0.23, 1, 0.32, 1) forwards;
        }

        @keyframes slideUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body
    class="auth-bg min-h-screen flex items-start justify-center p-4 py-12 transition-colors duration-500 overflow-y-auto">

    <!-- Toggle Theme (Shared) -->
    <div class="fixed top-4 right-4 z-50 flex items-center gap-3">
        <button type="button" data-rtl-toggle
            class="px-4 py-3 rounded-full border border-white/50 bg-white/90 text-xs font-bold uppercase tracking-widest text-primary shadow-lg backdrop-blur-md transition-colors hover:bg-white">
            RTL
        </button>
        <button id="theme-toggle"
            class="p-3 bg-white dark:bg-dark-bg/50 backdrop-blur-md rounded-full shadow-lg hover:scale-110 transition-transform">
            <span class="dark:hidden">🌙</span>
            <span class="hidden dark:block">☀️</span>
        </button>
    </div>

    <!-- Registration Card -->
    <div
        class="w-full max-w-lg relative z-10 glass-effect bg-white/40 dark:bg-black/30 backdrop-blur-3xl p-8 md:p-12 rounded-[3.5rem] shadow-2xl border border-white/40 dark:border-white/5 my-auto slide-up-form">
        <div class="text-center mb-10">
            <a href="index.html"
                class="flex items-center justify-center space-x-2 text-primary mb-6 hover:scale-105 transition-transform">
                <span class="text-3xl">🌱</span>
                <span class="font-premium font-bold text-2xl uppercase text-gray-800 dark:text-white">Handmade
                    Soap</span>
            </a>
            <h1 class="text-3xl font-bold mb-2">Create Your Profile</h1>
            <p class="text-sm text-gray-500 dark:text-gray-400">Sign up in seconds and start your skincare ritual.</p>
        </div>

        <form class="space-y-4">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div class="space-y-1">
                    <label class="text-[10px] font-bold uppercase tracking-widest text-primary ml-2">Artisan
                        Name</label>
                    <input type="text" placeholder=""
                        class="w-full bg-white/50 dark:bg-black/20 p-4 rounded-2xl outline-none border-2 border-transparent focus:border-primary transition-all text-sm">
                </div>
                <div class="space-y-1">
                    <label class="text-[10px] font-bold uppercase tracking-widest text-primary ml-2">Last Ritual</label>
                    <input type="text" placeholder=""
                        class="w-full bg-white/50 dark:bg-black/20 p-4 rounded-2xl outline-none border-2 border-transparent focus:border-primary transition-all text-sm">
                </div>
            </div>

            <div class="space-y-1">
                <label class="text-[10px] font-bold uppercase tracking-widest text-primary ml-2">Email Ritual</label>
                <input type="email" placeholder=""
                    class="w-full bg-white/50 dark:bg-black/20 p-4 rounded-2xl outline-none border-2 border-transparent focus:border-primary transition-all text-sm">
            </div>

            <div class="space-y-1 relative">
                <label class="text-[10px] font-bold uppercase tracking-widest text-primary ml-2">Seed Password</label>
                <input type="password" placeholder=""
                    class="w-full bg-white/50 dark:bg-black/20 p-4 rounded-2xl outline-none border-2 border-transparent focus:border-primary transition-all text-sm">
                <button type="button"
                    class="absolute right-5 bottom-4 text-gray-400 hover:text-primary transition-colors">👁️</button>
            </div>

            <div class="space-y-1 relative">
                <label class="text-[10px] font-bold uppercase tracking-widest text-primary ml-2">Confirm Password</label>
                <input type="password" placeholder=""
                    class="w-full bg-white/50 dark:bg-black/20 p-4 rounded-2xl outline-none border-2 border-transparent focus:border-primary transition-all text-sm">
                <button type="button"
                    class="absolute right-5 bottom-4 text-gray-400 hover:text-primary transition-colors">&#128065;&#65039;</button>
            </div>

            <div class="flex items-start space-x-3 px-2 text-xs">
                <input type="checkbox" class="mt-1 w-4 h-4 accent-primary rounded-lg cursor-pointer">
                <p class="text-gray-500 dark:text-gray-400">I agree to the <a href="#"
                        class="text-primary font-bold hover:underline">Terms</a> and the use of
                    natural botanical ingredients in my habit.</p>
            </div>

            <button type="submit"
                class="btn-primary w-full py-4 text-lg font-bold shadow-xl shadow-primary/20 hover:scale-[1.01] transition-transform mt-4">Begin
                My Ritual</button>

            <div class="relative py-2 flex items-center justify-center">
                <div class="absolute inset-0 flex items-center">
                    <div class="w-full border-t border-gray-200/50 dark:border-white/10"></div>
                </div>
                <span
                    class="relative bg-transparent px-4 text-[10px] font-bold text-gray-400 uppercase tracking-widest">Or
                    Start With</span>
            </div>

            <div class="grid grid-cols-3 gap-3">
                <button type="button"
                    class="bg-white/60 dark:bg-white/10 hover:bg-white dark:hover:bg-white/20 p-3 rounded-xl border border-white/20 transition-all flex items-center justify-center">
                    <svg class="w-5 h-5" viewBox="0 0 48 48">
                        <path fill="#EA4335"
                            d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z">
                        </path>
                        <path fill="#4285F4"
                            d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z">
                        </path>
                        <path fill="#FBBC05"
                            d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z">
                        </path>
                        <path fill="#34A853"
                            d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z">
                        </path>
                    </svg>
                </button>
                <button type="button"
                    class="bg-white/60 dark:bg-white/10 hover:bg-white dark:hover:bg-white/20 p-3 rounded-xl border border-white/20 transition-all flex items-center justify-center">
                    <svg class="w-5 h-5 dark:fill-white" viewBox="0 0 384 512">
                        <path
                            d="M318.7 268.7c-.2-36.7 16.4-64.4 50-84.8-18.8-26.9-47.2-41.7-84.7-44.6-35.5-2.8-74.3 20.7-88.5 20.7-15 0-49.4-19.7-76.4-19.7C63.3 141.2 4 184.8 4 273.5q0 39.3 14.4 81.2c12.8 36.7 59 126.7 107.2 125.2 25.2-.6 43-17.9 75.8-17.9 31.8 0 48.3 17.9 76.4 17.9 48.6-.7 90.4-82.5 102.6-119.3-65.2-30.7-61.7-90-61.7-91.9zm-56.6-164.2c27.3-32.4 24.8-61.9 24-72.5-24.1 1.4-52 16.4-67.9 34.9-17.5 19.8-27.8 44.3-25.6 71.9 26.1 2 49.9-11.4 69.5-34.3z">
                        </path>
                    </svg>
                </button>
                <button type="button"
                    class="bg-white/60 dark:bg-white/10 hover:bg-white dark:hover:bg-white/20 p-3 rounded-xl border border-white/20 transition-all flex items-center justify-center">
                    <svg class="w-5 h-5 fill-[#1877F2]" viewBox="0 0 24 24">
                        <path
                            d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z">
                        </path>
                    </svg>
                </button>
            </div>

            <p class="text-center text-gray-500 mt-8 text-sm">Already a member? <a href="login.html"
                    class="text-primary font-bold hover:underline">Return to Login</a></p>
        </form>
    </div>

    <script src="assets/js/main.js"></script>
</body>

</html>
